    header { border-bottom: 1px solid var(--border); padding: 28px 0 24px; text-align: center; }
    .badge { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-dim); color: #c7cdf8; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; margin-bottom: 16px; }

    .meta { margin-top: 10px; font-size: 13px; color: var(--muted); }
    main { max-width: 780px; margin: 0 auto; padding: 56px 24px 80px; }
    section { margin-bottom: 48px; }
    section h2 { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; color: var(--heading); display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

    section p { margin-bottom: 12px; }
    section p:last-child { margin-bottom: 0; }
    h3 { font-size: 14px; font-weight: 600; color: var(--heading); margin: 18px 0 8px; }
    ul { list-style: none; padding-left: 4px; }
    ul li { padding: 4px 0 4px 20px; position: relative; color: var(--text); }
    ul li::before { content: ''; position: absolute; left: 0; top: 13px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .callout { background: var(--surface); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 14px 18px; font-size: 14px; color: #a8acca; margin: 16px 0; }
    .rights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 14px; }
    .right-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--text); }
    .right-card strong { display: block; color: var(--heading); margin-bottom: 3px; font-size: 13px; }
    hr { border: none; border-top: 1px solid var(--border); margin: 0 0 48px; }
    footer { border-top: 1px solid var(--border); text-align: center; padding: 28px 24px; font-size: 13px; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }
    .lang-btn { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--heading); box-shadow: 0 4px 20px rgba(0,0,0,.4); transition: border-color .15s, transform .15s; user-select: none; }

    .lang-pill { background: var(--accent); color: #fff; border-radius: 99px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
